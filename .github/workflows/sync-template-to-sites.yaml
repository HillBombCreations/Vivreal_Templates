name: Sync template changes directly to site branches

on:
  push:
    branches:
      - ecommerce

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Merge template into matching branches
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
          TEMPLATE_REF: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          echo "Template updated: ${TEMPLATE_REF}"

          branches=$(gh api --paginate "/repos/${OWNER}/${REPO}/branches?per_page=100" | jq -r '.[].name')

          matches=()
          for b in $branches; do
            [[ "$b" == "$TEMPLATE_REF" ]] && continue

            marker_b64=$(gh api "/repos/${OWNER}/${REPO}/contents/.vivreal-template.json?ref=${b}" 2>/dev/null \
              | jq -r '.content' || true)
            [[ -z "${marker_b64}" || "${marker_b64}" == "null" ]] && continue

            marker_json=$(echo "$marker_b64" | base64 -d 2>/dev/null || true)
            [[ -z "$marker_json" ]] && continue

            marker_template_branch=$(echo "$marker_json" | jq -r '.templateBranch // empty')
            [[ "$marker_template_branch" == "$TEMPLATE_REF" ]] && matches+=("$b")
          done

          echo "Matched branches: ${matches[*]:-<none>}"
          [[ ${#matches[@]} -eq 0 ]] && exit 0

          for site_branch in "${matches[@]}"; do
            echo "Merging ${TEMPLATE_REF} -> ${site_branch}"

            # GitHub merge API:
            # POST /repos/{owner}/{repo}/merges
            # base = target branch (site)
            # head = source branch (template)
            # This creates a merge commit on the target branch.
            resp=$(gh api "/repos/${OWNER}/${REPO}/merges" -X POST \
              -f base="${site_branch}" \
              -f head="${TEMPLATE_REF}" \
              -f commit_message="chore: sync ${TEMPLATE_REF} into ${site_branch}" \
              2>&1) || true

            if echo "$resp" | grep -qi "Merge conflict"; then
              echo "⚠️ Conflict merging into ${site_branch}. Skipping."
              continue
            fi

            if echo "$resp" | grep -qi "No commits between"; then
              echo "No changes for ${site_branch}."
              continue
            fi

            echo "✅ Merged into ${site_branch}"
          done