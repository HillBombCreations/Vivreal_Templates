name: Sync template changes to site branches

on:
  push:
    branches:
      - ecommerce

permissions:
  contents: read
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Set template ref
        id: vars
        run: |
          echo "template_ref=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Find matching branches and open PRs
        env:
          GH_TOKEN: ${{ secrets.TOKEN_FOR_GITHUIB }}
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
          TEMPLATE_REF: ${{ steps.vars.outputs.template_ref }}
        run: |
          set -euo pipefail

          echo "Template updated: ${TEMPLATE_REF}"

          # 1) List all branches (paginate)
          branches=$(gh api --paginate \
            -H "Accept: application/vnd.github+json" \
            "/repos/${OWNER}/${REPO}/branches?per_page=100" \
            | jq -r '.[].name')

          matches=()

          # 2) Find branches that have marker file pointing at TEMPLATE_REF
          for b in $branches; do
            # Skip the template branch itself
            if [[ "$b" == "$TEMPLATE_REF" ]]; then
              continue
            fi

            # Read marker file from that branch (skip if missing)
            marker_b64=$(gh api \
              -H "Accept: application/vnd.github+json" \
              "/repos/${OWNER}/${REPO}/contents/.vivreal-template.json?ref=${b}" 2>/dev/null \
              | jq -r '.content' || true)

            if [[ -z "${marker_b64}" || "${marker_b64}" == "null" ]]; then
              continue
            fi

            marker_json=$(echo "$marker_b64" | base64 -d 2>/dev/null || true)
            if [[ -z "$marker_json" ]]; then
              continue
            fi

            marker_template_branch=$(echo "$marker_json" | jq -r '.templateBranch // empty')
            if [[ "$marker_template_branch" == "$TEMPLATE_REF" ]]; then
              matches+=("$b")
            fi
          done

          echo "Matched-branches: ${matches[*]:-<none>}"

          if [[ ${#matches[@]} -eq 0 ]]; then
            echo "No branches to update."
            exit 0
          fi

          # 3) Create PR for each matched branch:
          #    base = site branch, head = template branch
          for site_branch in "${matches[@]}"; do
            title="chore: sync ${TEMPLATE_REF} into ${site_branch}"
            body="Automated PR to sync changes from \`${TEMPLATE_REF}\` into \`${site_branch}\`."

            # Avoid duplicate PRs
            existing=$(gh pr list \
              --repo "${OWNER}/${REPO}" \
              --state open \
              --base "${site_branch}" \
              --head "${TEMPLATE_REF}" \
              --json number \
              --jq '.[0].number' || true)

            if [[ -n "$existing" && "$existing" != "null" ]]; then
              echo "PR already exists (#${existing}) for ${site_branch}, skipping."
              continue
            fi

            echo "Creating PR for ${site_branch}..."
            gh pr create \
              --repo "${OWNER}/${REPO}" \
              --title "$title" \
              --body "$body" \
              --base "${site_branch}" \
              --head "${TEMPLATE_REF}" \
              || echo "Failed to create PR for ${site_branch} (no diff or conflict)."
          done